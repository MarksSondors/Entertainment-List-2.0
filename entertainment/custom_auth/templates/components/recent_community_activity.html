{% load static %}

<!-- Recent Community Activity Component -->
<div class="window community-activity-window" style="width: 100%;">
    <div class="title-bar">
        <div class="title-bar-text">Recent Community Activity</div>
    </div>
    <div class="window-body">
        <div class="community-activity-toolbar">
            <label for="community-activity-filter">Filter:</label>
            <select id="community-activity-filter" aria-label="Filter community activity">
                <option value="all">All activity</option>
                <option value="movies">Movies</option>
                <option value="tvshows">TV shows</option>
                <option value="books">Books</option>
                <option value="games">Games</option>
                <option value="watched">Watched</option>
                <option value="watchlist">Watchlist</option>
                <option value="reviews">Reviews</option>
            </select>
        </div>
        <div class="community-activity-panel">
            <div id="horizontal_recent_activity" class="community-activity-feed" aria-live="polite" aria-busy="true">
                <div class="community-activity-item community-activity-loading">
                    <div class="community-activity-poster loading-placeholder"></div>
                    <div class="community-activity-body">
                        <div class="loading-placeholder community-activity-loading-line"></div>
                        <div class="loading-placeholder community-activity-loading-line community-activity-loading-line-short"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="community-activity-controls">
            <span id="loading-more-activity" class="community-activity-loading-more" hidden>Loading more...</span>
            <button id="load-more-activity" type="button" hidden>Load more</button>
        </div>
    </div>
    <div class="status-bar">
        <div class="status-bar-field" id="activity-last-updated-horizontal">Last updated: Just now</div>
        <div class="status-bar-field">
            <span id="refresh-indicator-horizontal" hidden><img src="{% static 'images/win98/world.png' %}" alt="Refreshing" width="16" height="16"></span>
            <span id="auto-refresh-status">Auto-refresh: ON</span>
        </div>
    </div>
</div>

<style>
    /* Horizontal Activity Styles */
    .horizontal-activity-container {
        position: relative;
        overflow: hidden;
        border: 1px inset var(--bg-color);
        background-color: var(--window-bg);
        padding: 8px;
    }

    /* Fix for icons inheriting border from global styles */
    .activity-title img,
    .activity-action img,
    .watched-badge img,
    .review-badge img {
        border: none !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        background: transparent !important;
    }
    
    .horizontal-activity-scroll {
        display: flex;
        overflow-x: auto;
        scroll-behavior: smooth;
        gap: 12px;
        padding: 4px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-dark) var(--bg-color);
    }
    
    .horizontal-activity-scroll::-webkit-scrollbar {
        height: 8px;
    }
    
    .horizontal-activity-scroll::-webkit-scrollbar-thumb {
        background: var(--border-dark);
        border-radius: 4px;
    }
    
    .horizontal-activity-scroll::-webkit-scrollbar-track {
        background: var(--bg-color);
    }
      .activity-card {
        flex: 0 0 auto;
        width: 200px;
        background-color: var(--window-bg);
        border: 1px solid var(--border-dark);
        border-radius: 0;
        overflow: hidden;
        transition: background-color 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: block;
        height: auto;
    }
    
    .activity-card:hover {
        background-color: var(--button-hover);
        text-decoration: none;
        color: inherit;
    }
    
    .activity-card.loading-card {
        background-color: var(--bg-color);
        cursor: default;
    }      .activity-poster {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-bottom: 1px solid var(--border-dark);
    }.poster-container {
        position: relative;
        width: 100%;
        height: 240px;
        overflow: hidden;
    }.poster-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-bottom: 1px solid var(--border-dark);
        background-color: var(--bg-color);
    }
    
    .poster-rating-overlay {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 10;
        background-color: rgba(0, 0, 0, 0.8);
        border-radius: 4px;
        padding: 4px 6px;
        font-weight: bold;
        font-size: 14px;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(4px);
    }
    
    .loading-placeholder {
        background: linear-gradient(90deg, var(--bg-color) 25%, var(--button-hover) 50%, var(--bg-color) 75%);
        background-size: 200% 100%;
        animation: loading-shimmer 1.5s infinite;
    }
    
    @keyframes loading-shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }      .activity-info {
        padding: 8px;
        font-size: 14px;
        min-height: 100px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 4px;
    }
      .activity-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 12px;
    }
    
    .activity-username {
        font-weight: bold;
        color: var(--text-color);
        text-decoration: underline;
    }
    
    .activity-timestamp {
        color: var(--text-muted);
        font-size: 10px;
    }      .activity-title {
        font-weight: bold;
        margin-bottom: 6px;
        font-size: 13px;
        line-height: 1.2;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        color: var(--text-color);
        flex-grow: 0;
    }.activity-text {
        font-style: italic;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--text-muted);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex-grow: 1;
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.2;
    }
    .activity-action {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
    }
      .watched-badge {
        display: inline-block;
        margin-right: 2px;
        font-size: 14px;
    }
    
    .review-badge {
        display: inline-block;
        margin-right: 4px;
        font-size: 12px;
        background-color: var(--button-hover);
        color: var(--text-color);
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: bold;
        border: 1px solid var(--border-dark);
    }
      .activity-controls {
        display: flex;
        align-items: center;
    }
    
    .activity-controls .retro-btn {
        padding: 2px 6px;
        font-size: 12px;
        min-width: 24px;
    }
    
    /* Loading indicator */
    .loading-more-activity {
        font-size: 11px;
        color: var(--text-muted);
    }        /* Mobile adjustments */
        @media (max-width: 768px) {
            .activity-card {
                width: 160px;
            }
            
            .activity-poster, .poster-container {
                height: 200px;
            }
            
            .activity-info {
                padding: 6px;
                min-height: 90px;
                font-size: 12px;
            }
            
            .activity-title {
                font-size: 11px;
            }
            
            .activity-text {
                font-size: 10px;
            }
            
            .poster-rating-overlay {
                font-size: 12px;
                padding: 3px 5px;
                top: 6px;
                right: 6px;
            }
            
            .review-badge {
                font-size: 10px;
                padding: 1px 4px;
            }
        }
      /* Dark mode enhancements */
    @media (prefers-color-scheme: dark) {
        .activity-card {
            border-color: var(--border-light);
        }
        
        .activity-card:hover {
            background-color: var(--button-hover);
        }
        
        .activity-poster, .poster-container img {
            border-bottom-color: var(--border-light);
        }
    }
</style>

<style>
    .community-activity-window .title-bar-text {
        font-size: 13px;
    }

    .community-activity-window .status-bar-field {
        font-size: 12px;
    }

    .community-activity-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
        padding: 4px 6px;
        border: 1px solid var(--border-dark);
        background-color: var(--bg-color);
    }

    .community-activity-toolbar label {
        font-size: 13px;
        font-weight: bold;
    }

    .community-activity-toolbar select {
        width: 100%;
        height: 30px !important;
        min-height: 30px !important;
        padding-top: 2px;
        padding-right: 34px;
        padding-bottom: 2px;
        background-position: calc(100% - 2px) 2px;
        background-size: 24px 26px;
        font-size: 13px;
    }

    .community-activity-panel {
        border: 1px inset var(--bg-color);
        background-color: var(--window-bg);
        padding: 2px 8px;
    }

    .community-activity-feed {
        display: flex;
        flex-direction: column;
    }

    .community-activity-item {
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr);
        gap: 9px;
        min-height: 84px;
        padding: 7px 0;
        background-color: var(--window-bg);
        border-bottom: 1px solid var(--border-dark);
        color: inherit;
        text-decoration: none;
        transition: background-color 0.2s;
    }

    .community-activity-item:last-child {
        border-bottom: 0;
    }

    .community-activity-item:hover {
        background-color: var(--button-hover);
    }

    .community-activity-poster-link {
        display: block;
        width: fit-content;
        height: fit-content;
    }

    .community-activity-poster-link:focus-visible,
    .community-activity-title:focus-visible,
    .community-activity-review-toggle:focus-visible {
        outline: 1px dotted var(--text-color);
        outline-offset: 2px;
    }

    .community-activity-poster {
        width: 56px;
        height: 84px;
        object-fit: cover;
        border: 1px solid var(--border-dark);
        background-color: var(--bg-color);
    }

    .community-activity-body {
        display: flex;
        min-width: 0;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding: 1px 4px 1px 0;
    }

    .community-activity-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        font-size: 13px;
    }

    .community-activity-username {
        color: var(--text-color);
        font-weight: bold;
        text-decoration: underline;
    }

    .community-activity-timestamp {
        flex-shrink: 0;
        color: var(--text-muted);
        font-size: 12px;
    }

    .community-activity-title {
        width: fit-content;
        color: var(--text-color);
        font-size: 15px;
        font-weight: bold;
        line-height: 1.35;

        text-decoration: none;
    }

    .community-activity-title:hover {

    }

    .community-activity-details {

    .community-activity-media {

    #refresh-indicator-horizontal img {

        box-shadow: none !important;
        vertical-align: middle;

    @media (max-width: 480px) {

            gap: 8px;

            width: 52px;
            height: 78px;

        }

</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Activity state management
        let currentPage = 1;
        let isLoading = false;
        let hasMoreData = true;
        let autoRefreshInterval = null;
        let autoRefreshEnabled = true;
        let allActivities = []; // Store all loaded activities
        let activeFilter = 'all';
        let reviewToggleId = 0;
        
        const activityContainer = document.getElementById('horizontal_recent_activity');
        const loadingIndicator = document.getElementById('loading-more-activity');
        const refreshIndicator = document.getElementById('refresh-indicator-horizontal');
        const autoRefreshStatus = document.getElementById('auto-refresh-status');
        const loadMoreButton = document.getElementById('load-more-activity');
        const activityFilter = document.getElementById('community-activity-filter');
        
        // Initialize
        fetchHorizontalActivity(1, true); // Initial load, replace content
        startAutoRefresh();
        
        if (loadMoreButton) {
            loadMoreButton.addEventListener('click', function() {
                disableAutoRefresh();
                loadMoreActivity();
            });
        }

        if (activityFilter) {
            activityFilter.addEventListener('change', function() {
                activeFilter = activityFilter.value;
                currentPage = 1;
                hasMoreData = true;
                allActivities = [];
                if (loadMoreButton) loadMoreButton.hidden = true;
                showActivityLoadingState();
                startAutoRefresh();
                fetchHorizontalActivity(1, true);
            });
        }
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshEnabled = true;
            if (autoRefreshStatus) {
                autoRefreshStatus.textContent = 'Auto-refresh: ON';
            }
            autoRefreshInterval = setInterval(() => {
                if (autoRefreshEnabled && currentPage === 1) {
                    fetchHorizontalActivity(1, true); // Only refresh if on first page
                }
            }, 60000); // Refresh every 60 seconds
        }
        
        function disableAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
            autoRefreshEnabled = false;
            if (autoRefreshStatus) {
                autoRefreshStatus.textContent = 'Auto-refresh: OFF';
            }
        }
        
        function loadMoreActivity() {
            if (isLoading || !hasMoreData) return;
            
            currentPage++;
            fetchHorizontalActivity(currentPage, false); // Append to existing content
        }
        
        function fetchHorizontalActivity(page, replaceContent = false) {
            if (isLoading) return;
            isLoading = true;
            activityContainer.setAttribute('aria-busy', 'true');
            
            // Show loading indicators
            if (refreshIndicator && replaceContent) {
                refreshIndicator.hidden = false;
                refreshIndicator.classList.add('spinning');
            }
            
            if (loadingIndicator && !replaceContent) {
                loadingIndicator.hidden = false;
            }
            if (loadMoreButton) {
                loadMoreButton.disabled = true;
            }
            if (activityFilter) {
                activityFilter.disabled = true;
            }
            
            fetch(`/activity/recent/?page=${page}&limit=3&filter=${encodeURIComponent(activeFilter)}`)
                .then(response => response.json())
                .then(data => {
                    isLoading = false;
                    
                    // Hide loading indicators
                    if (refreshIndicator) {
                        refreshIndicator.hidden = true;
                        refreshIndicator.classList.remove('spinning');
                    }
                    if (loadingIndicator) {
                        loadingIndicator.hidden = true;
                    }
                    
                    // Update last updated time
                    const now = new Date();
                    const lastUpdatedElement = document.getElementById('activity-last-updated-horizontal');
                    if (lastUpdatedElement) {
                        lastUpdatedElement.textContent = 'Last updated: ' + now.toLocaleTimeString();
                    }
                    
                    const results = data.results || data;
                    
                    // Check if we have more data
                    hasMoreData = data.pagination ? data.pagination.has_more : false;
                    if (loadMoreButton) {
                        loadMoreButton.hidden = !hasMoreData;
                        loadMoreButton.disabled = false;
                    }
                    if (activityFilter) {
                        activityFilter.disabled = false;
                    }
                    
                    if (replaceContent) {
                        // Replace all content (initial load or refresh)
                        allActivities = results;
                        activityContainer.innerHTML = '';
                        activityContainer.setAttribute('aria-busy', 'false');
                        currentPage = 1;
                    } else {
                        // Append new content (infinite scroll)
                        allActivities = allActivities.concat(results);
                        activityContainer.setAttribute('aria-busy', 'false');
                    }
                    
                    // Render the new activities
                    if (results.length === 0 && replaceContent) {
                        activityContainer.innerHTML = `
                            <div class="community-activity-item community-activity-empty">
                                <span>No community activity yet.</span>
                            </div>
                        `;
                        return;
                    }
                    
                    // Render only the new activities (or all if replacing)
                    const activitiesToRender = replaceContent ? allActivities : results;
                    
                    activitiesToRender.forEach(activity => {
                        const activityCard = createActivityCard(activity);
                        activityContainer.appendChild(activityCard);
                    });
                })
                .catch(error => {
                    console.error('Error fetching horizontal activity:', error);
                    isLoading = false;
                    activityContainer.setAttribute('aria-busy', 'false');

                    if (!replaceContent) {
                        currentPage--;
                    }
                    
                    // Hide loading indicators
                    if (refreshIndicator) {
                        refreshIndicator.hidden = true;
                        refreshIndicator.classList.remove('spinning');
                    }
                    if (loadingIndicator) {
                        loadingIndicator.hidden = true;
                    }
                    if (loadMoreButton) {
                        loadMoreButton.disabled = false;
                    }
                    if (activityFilter) {
                        activityFilter.disabled = false;
                    }
                    
                    if (replaceContent) {
                        activityContainer.innerHTML = `
                            <div class="community-activity-item community-activity-empty">
                                <span>Failed to load activity.</span>
                            </div>
                        `;
                    }
                });
        }

        function showActivityLoadingState() {
            activityContainer.setAttribute('aria-busy', 'true');
            activityContainer.innerHTML = `
                <div class="community-activity-item community-activity-loading">
                    <div class="community-activity-poster loading-placeholder"></div>
                    <div class="community-activity-body">
                        <div class="loading-placeholder community-activity-loading-line"></div>
                        <div class="loading-placeholder community-activity-loading-line community-activity-loading-line-short"></div>
                    </div>
                </div>
            `;
        }
        
        function createActivityCard(activity) {
            const activityCard = document.createElement('article');
            activityCard.className = 'community-activity-item';
            
            // Set URL based on content type
            let detailUrl = '#';
            if (activity.content_type === 'Movie' && activity.tmdb_id) {
                detailUrl = `/movies/${activity.tmdb_id}`;
            } else if (activity.content_type === 'TV Show' && activity.tmdb_id) {
                detailUrl = `/tvshows/${activity.tmdb_id}`;
            } else if (activity.content_type === 'Game' && activity.media_id) {
                detailUrl = `/games/${activity.media_id}/`;
            } else if (activity.content_type === 'Book' && activity.media_id) {
                detailUrl = `/books/${activity.media_id}/`;
            }
            const poster = document.createElement('img');
            poster.className = 'community-activity-poster';
            poster.src = activity.poster_path || "{% static 'images/frontend-logo.png' %}";
            poster.alt = `${activity.title} poster`;
            poster.loading = 'lazy';

            const posterLink = document.createElement('a');
            posterLink.className = 'community-activity-poster-link';
            posterLink.href = detailUrl;
            posterLink.setAttribute('aria-label', `View ${activity.title}`);
            posterLink.appendChild(poster);
            activityCard.appendChild(posterLink);

            const body = document.createElement('div');
            body.className = 'community-activity-body';

            const header = document.createElement('div');
            header.className = 'community-activity-header';

            const username = document.createElement('span');
            username.className = 'community-activity-username';
            username.textContent = activity.username;

            const timestamp = document.createElement('time');
            timestamp.className = 'community-activity-timestamp';
            const activityDate = parseActivityTimestamp(activity.timestamp);
            timestamp.dateTime = activityDate ? activityDate.toISOString() : '';
            timestamp.title = activityDate ? activityDate.toLocaleString() : activity.timestamp;
            timestamp.textContent = activityDate ? formatRelativeTime(activityDate) : activity.timestamp;

            header.append(username, timestamp);
            body.appendChild(header);

            const title = document.createElement('a');
            title.className = 'community-activity-title';
            title.href = detailUrl;
            title.textContent = activity.title;
            body.appendChild(title);

            const details = document.createElement('div');
            details.className = 'community-activity-details';

            const mediaType = document.createElement('span');
            mediaType.className = 'community-activity-media';
            mediaType.textContent = activity.content_type;

            const separator = document.createElement('span');
            separator.className = 'community-activity-detail-separator';
            separator.textContent = '·';

            const action = document.createElement('span');
            action.className = 'community-activity-action';
            action.textContent = activity.action === 'added to database and added to watchlist'
                ? 'added to database & watchlist'
                : activity.action || 'updated';

            details.append(mediaType, separator, action);
            body.appendChild(details);

            if ('rating' in activity) {
                const ratingValue = Math.round(activity.rating);
                const rating = document.createElement('span');
                rating.className = 'community-activity-rating';
                rating.style.backgroundColor = ratingValue >= 7 ? '#287d38' : ratingValue >= 5 ? '#8a6900' : '#a12622';
                rating.textContent = `${ratingValue}/10`;
                const ratingSeparator = separator.cloneNode(true);
                details.append(ratingSeparator, rating);
            }

            if (activity.content) {
                const review = document.createElement('p');
                review.className = 'community-activity-review';
                review.id = `community-review-${reviewToggleId++}`;
                review.textContent = `“${activity.content}”`;
                body.appendChild(review);

                const reviewToggle = document.createElement('button');
                reviewToggle.className = 'community-activity-review-toggle';
                reviewToggle.type = 'button';
                reviewToggle.textContent = 'Show full review';
                reviewToggle.setAttribute('aria-expanded', 'false');
                reviewToggle.setAttribute('aria-controls', review.id);
                reviewToggle.hidden = true;
                reviewToggle.addEventListener('click', function() {
                    const expanded = review.classList.toggle('is-expanded');
                    reviewToggle.setAttribute('aria-expanded', String(expanded));
                    reviewToggle.textContent = expanded ? 'Collapse review' : 'Show full review';
                });
                body.appendChild(reviewToggle);

                requestAnimationFrame(function() {
                    reviewToggle.hidden = review.scrollHeight <= review.clientHeight;
                });
            }

            activityCard.appendChild(body);
            
            return activityCard;
        }

        function parseActivityTimestamp(value) {
            if (!value) return null;
            const parsed = new Date(value.replace(' ', 'T'));
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        function formatRelativeTime(date) {
            const elapsedSeconds = Math.round((date.getTime() - Date.now()) / 1000);
            const ranges = [
                ['year', 31536000],
                ['month', 2592000],
                ['week', 604800],
                ['day', 86400],
                ['hour', 3600],
                ['minute', 60]
            ];
            const formatter = new Intl.RelativeTimeFormat(undefined, { numeric: 'auto' });

            for (const [unit, seconds] of ranges) {
                if (Math.abs(elapsedSeconds) >= seconds) {
                    return formatter.format(Math.round(elapsedSeconds / seconds), unit);
                }
            }

            return 'just now';
        }
        
        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    });
    
    // Add spinning animation for refresh indicator
    const style = document.createElement('style');
    style.textContent = `
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinning {
            display: inline-block;
            animation: spin 1s infinite linear;
        }
    `;
    document.head.appendChild(style);
</script>
